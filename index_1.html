<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #FAF9F6; --surface: #FFFFFF; --surface-2: #F1EFE8;
    --border: rgba(0,0,0,0.1); --border-md: rgba(0,0,0,0.18);
    --text: #1A1A18; --muted: #6B6A65; --hint: #A09F9A; --accent: #1A1A18;
    --r-md: 8px; --r-lg: 14px;
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'EB Garamond', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); min-height: 100vh; font-family: var(--font-body); color: var(--text); line-height: 1.6; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Auth */
  .auth-wrap { max-width: 380px; margin: 0 auto; padding: 4rem 1.5rem; }
  .auth-wordmark { font-family: var(--font-display); font-size: 28px; font-weight: 400; text-align: center; margin-bottom: 6px; }
  .auth-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2.5rem; }
  .auth-tabs { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
  .auth-tab { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; padding: 10px; cursor: pointer; font-size: 14px; font-family: var(--font-body); color: var(--muted); transition: all 0.15s; }
  .auth-tab.on { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .field input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border-md); border-radius: var(--r-md); font-family: var(--font-body); font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--accent); }
  .auth-error { background: #FCEBEB; color: #791F1F; border-radius: var(--r-md); padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }
  .auth-success { background: #EAF3DE; color: #27500A; border-radius: var(--r-md); padding: 10px 14px; font-size: 13px; margin-bottom: 14px; }

  /* Main */
  .wordmark { font-family: var(--font-display); font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .logout-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--hint); text-decoration: underline; font-family: var(--font-body); }
  .header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; }
  .level-name { font-family: var(--font-display); font-size: 22px; font-weight: 400; line-height: 1.2; margin-bottom: 3px; }
  .xp-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-bar { width: 160px; height: 3px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 3px; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
  .progress-hint { font-size: 11px; color: var(--hint); margin-top: 5px; }
  .streak-block { text-align: right; }
  .streak-num { font-family: var(--font-display); font-size: 28px; font-weight: 400; line-height: 1; }
  .streak-label { font-size: 11px; color: var(--muted); }
  .nav { display: flex; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nb { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 14px; cursor: pointer; font-size: 13px; font-family: var(--font-body); color: var(--muted); white-space: nowrap; transition: color 0.15s; }
  .nb:hover { color: var(--text); }
  .nb.on { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--r-lg); padding: 1.25rem; margin-bottom: 12px; }
  .tag { display: inline-block; padding: 2px 9px; background: var(--surface-2); color: var(--muted); border-radius: 10px; font-size: 11px; margin: 2px 2px 2px 0; }
  .challenge-block { background: var(--surface-2); border-radius: var(--r-md); padding: 14px 16px; border-left: 2px solid var(--border-md); margin-top: 1rem; }
  .challenge-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 7px; }
  .challenge-text { font-size: 14px; line-height: 1.7; }
  .type-btn { background: none; border: 0.5px solid var(--border-md); padding: 7px 14px; border-radius: var(--r-md); cursor: pointer; font-size: 13px; font-family: var(--font-body); color: var(--muted); transition: all 0.15s; }
  textarea { width: 100%; min-height: 95px; padding: 10px 12px; border: 0.5px solid var(--border-md); border-radius: var(--r-md); font-family: var(--font-body); font-size: 14px; resize: vertical; background: var(--bg); color: var(--text); line-height: 1.65; margin-top: 12px; outline: none; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--accent); }
  .btn-main { background: var(--accent); color: var(--bg); border: none; padding: 9px 20px; border-radius: var(--r-md); cursor: pointer; font-size: 14px; font-weight: 500; font-family: var(--font-body); transition: opacity 0.15s; }
  .btn-main:hover { opacity: 0.82; }
  .flash { background: #EAF3DE; color: #27500A; padding: 11px 14px; border-radius: var(--r-md); margin-bottom: 1rem; font-size: 14px; font-weight: 500; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
  .badge { padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
  .metric { background: var(--surface-2); padding: 1rem; border-radius: var(--r-md); }
  .metric-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .metric-val { font-family: var(--font-display); font-size: 22px; font-weight: 400; }
  .metric-sub { font-size: 11px; color: var(--hint); margin-top: 5px; }
  .concept-author { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .concept-title { font-family: var(--font-display); font-size: 24px; font-weight: 400; margin-bottom: 10px; }
  .concept-body { font-size: 14px; line-height: 1.75; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .empty { text-align: center; padding: 3.5rem 1rem; color: var(--muted); }
  .empty p:first-child { font-family: var(--font-display); font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .author-header { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 1.5rem 0 10px; }
  .log-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; margin-bottom: 9px; }
  .log-date { font-size: 12px; color: var(--hint); }
  .log-concept { font-size: 13px; font-weight: 500; }
  .log-source { font-size: 11px; color: var(--hint); font-style: italic; margin-top: 8px; }
  .log-text { font-size: 14px; line-height: 1.65; }
  .bar-row { margin-bottom: 12px; }
  .bar-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
  .bar-info span:last-child { color: var(--muted); font-size: 12px; }
  .bar-track { height: 3px; background: var(--surface-2); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 3px; background: var(--accent); border-radius: 2px; }
  .reset-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--hint); text-decoration: underline; font-family: var(--font-body); }
  .count-badge { background: #EAF3DE; color: #27500A; padding: 1px 7px; border-radius: 8px; font-size: 11px; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--muted); font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-badge { font-size: 11px; color: var(--hint); text-align: right; margin-bottom: 8px; min-height: 16px; }
  @media (max-width: 480px) { .wrap { padding: 1.25rem 1rem 3rem; } .concept-title { font-size: 20px; } .level-name { font-size: 18px; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL = 'https://hnwjosjjszchmmjwvarp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhud2pvc2pqc3pjaG1tand2YXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTAyNjUsImV4cCI6MjA5MzIyNjI2NX0.wh7Oe4829cp6XAPDqKjDk_siYY4WGTtVVH35Hckx-EA';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const LEVELS = [
  {n:'Recluta',min:0,max:200},{n:'Soldato',min:200,max:500},
  {n:'Guerriero',min:500,max:1000},{n:'Campione',min:1000,max:2000},
  {n:'Gladiatore',min:2000,max:99999}
];
const XP = {Vittoria:50,Sconfitta:30,Insight:20};

let C=[], user=null;
let P={xp:0,streak:0,last_date:'',total:0};
let E=[];
let UI={view:'today',logType:'Insight',flash:null,authTab:'login',authError:'',authSuccess:'',syncing:false};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const lv = xp => LEVELS.find(l=>xp>=l.min&&xp<l.max)||LEVELS[4];
const todayIdx = () => Math.floor(Date.now()/86400000) % C.length;
const todayStr = () => new Date().toDateString();
const loggedToday = () => E.some(e=>new Date(e.created_at).toDateString()===todayStr());
const typeColors = t => {
  if(t==='Vittoria') return {bg:'#EAF3DE',tx:'#27500A',br:'#C0DD97'};
  if(t==='Sconfitta') return {bg:'#FCEBEB',tx:'#791F1F',br:'#F7C1C1'};
  return {bg:'#E6F1FB',tx:'#0C447C',br:'#B5D4F4'};
};
const traduciErrore = msg => {
  if(msg.includes('Invalid login')) return 'Email o password errati.';
  if(msg.includes('Email not confirmed')) return 'Conferma prima la tua email.';
  if(msg.includes('already registered')) return 'Email già registrata. Prova ad accedere.';
  if(msg.includes('Password should')) return 'La password deve essere di almeno 6 caratteri.';
  return msg;
};

// ─── Supabase data ────────────────────────────────────────────────────────────
async function loadUserData(){
  const uid = user.id;
  const {data:prof} = await sb.from('profiles').select('*').eq('id',uid).single();
  if(prof) P = {xp:prof.xp||0, streak:prof.streak||0, last_date:prof.last_date||'', total:prof.total||0};
  const {data:entries} = await sb.from('entries').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(200);
  if(entries) E = entries;
}
async function saveProfile(){
  await sb.from('profiles').upsert({id:user.id,xp:P.xp,streak:P.streak,last_date:P.last_date,total:P.total,updated_at:new Date().toISOString()});
}
async function saveEntry(entry){
  const {data} = await sb.from('entries').insert({user_id:user.id,concept_id:entry.cid,type:entry.type,text:entry.text,xp:entry.xp}).select().single();
  return data;
}

// ─── Concepts ─────────────────────────────────────────────────────────────────
async function loadConcepts(){
  try { const r=await fetch('./concepts.json'); if(!r.ok) throw new Error(); C=await r.json(); }
  catch(e){ C=[]; }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  const root = document.getElementById('root');
  if(!user){ root.innerHTML=renderAuth(); return; }
  if(!C.length){ root.innerHTML=`<div class="wrap"><div class="loading-screen"><div class="spinner"></div><span>Caricamento concetti...</span></div></div>`; return; }

  const concept=C[todayIdx()], level=lv(P.xp);
  const pct=Math.min(100,Math.round(((P.xp-level.min)/(level.max-level.min))*100));
  let h=`<div class="wrap">`;
  h+=`<div class="wordmark"><span>The Arena</span><button class="logout-btn" onclick="logout()">Esci (${user.email})</button></div>`;
  h+=`<div class="header">
    <div>
      <p class="level-name">${level.n}</p>
      <p class="xp-label">${P.xp} XP</p>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <p class="progress-hint">${level.max-P.xp<9999?level.max-P.xp+' XP al prossimo livello':'Livello massimo'}</p>
    </div>
    <div class="streak-block">
      <p class="streak-num">${P.streak}</p>
      <p class="streak-label">giorni streak</p>
      <p class="streak-label" style="margin-top:8px">${P.total} entr${P.total===1?'y':'ies'}</p>
    </div>
  </div>`;

  const views=[['today','Sfida del giorno'],['library','Libreria'],['log','Diario'],['stats','Stats']];
  h+=`<nav class="nav">`;
  views.forEach(([k,l])=>h+=`<button class="nb${UI.view===k?' on':''}" onclick="sv('${k}')">${l}</button>`);
  h+=`</nav>`;
  h+=`<div class="sync-badge">${UI.syncing?'⟳ Salvataggio in corso...':''}</div>`;
  if(UI.flash) h+=`<div class="flash" id="flash-msg">${UI.flash}</div>`;

  if(UI.view==='today') h+=viewToday(concept);
  else if(UI.view==='library') h+=viewLibrary();
  else if(UI.view==='log') h+=viewLog();
  else h+=viewStats();
  h+=`</div>`;
  root.innerHTML=h;
}

function renderAuth(){
  const isLogin=UI.authTab==='login';
  return `<div class="auth-wrap">
    <p class="auth-wordmark">The Arena</p>
    <p class="auth-sub">Il tuo spazio di pratica quotidiana</p>
    <div class="auth-tabs">
      <button class="auth-tab${isLogin?' on':''}" onclick="setAuthTab('login')">Accedi</button>
      <button class="auth-tab${!isLogin?' on':''}" onclick="setAuthTab('signup')">Registrati</button>
    </div>
    ${UI.authError?`<div class="auth-error">${UI.authError}</div>`:''}
    ${UI.authSuccess?`<div class="auth-success">${UI.authSuccess}</div>`:''}
    <div class="field"><label>Email</label><input type="email" id="auth-email" placeholder="tu@email.com"></div>
    <div class="field"><label>Password</label><input type="password" id="auth-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')authSubmit()"></div>
    <button class="btn-main" onclick="authSubmit()" style="width:100%;margin-top:6px">${isLogin?"Entra nell'Arena":'Crea account'}</button>
    ${isLogin?`<p style="font-size:12px;color:var(--hint);text-align:center;margin-top:14px"><button onclick="resetPassword()" style="background:none;border:none;cursor:pointer;color:var(--hint);text-decoration:underline;font-family:var(--font-body);font-size:12px">Password dimenticata?</button></p>`:''}
  </div>`;
}

// ─── Views ────────────────────────────────────────────────────────────────────
function viewToday(c){
  let h=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px">
      <div><p class="concept-author">${c.a} &mdash; <em>${c.b}</em></p><p class="concept-title">${c.t}</p></div>
      <div style="text-align:right;flex-shrink:0">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
    <p class="concept-body">${c.d}</p>
    <div class="challenge-block"><p class="challenge-label">Sfida del giorno</p><p class="challenge-text">${c.ch}</p></div>
  </div>`;

  if(loggedToday()){
    const entry=E.find(e=>new Date(e.created_at).toDateString()===todayStr());
    const col=typeColors(entry.type);
    h+=`<div class="card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="badge" style="background:${col.bg};color:${col.tx}">${entry.type}</span>
        <span style="font-size:13px;color:#6B6A65">Registrato oggi &mdash; +${entry.xp} XP</span>
      </div>
      <p class="log-text">${entry.text}</p>
    </div>
    <p style="font-size:13px;color:#A09F9A;text-align:center;padding:1rem">Torna domani per la prossima sfida. &nbsp;
      <button onclick="sv('library')" style="background:none;border:none;cursor:pointer;color:#1A1A18;font-size:13px;text-decoration:underline;font-family:var(--font-body)">Esplora la libreria</button></p>`;
  } else {
    const types=['Vittoria','Sconfitta','Insight'];
    h+=`<div class="card">
      <p class="section-label">Registra la tua esperienza</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${types.map(tp=>{const isOn=UI.logType===tp;const col=typeColors(tp);
          return `<button class="type-btn" data-tp="${tp}" onclick="stype('${tp}')" style="${isOn?`background:${col.bg};color:${col.tx};border-color:${col.br};font-weight:500`:''}">${tp} <span style="font-size:11px;opacity:0.7">+${XP[tp]}</span></button>`;
        }).join('')}
      </div>
      <textarea id="log-txt" placeholder="Descrivi un episodio, una riflessione, un errore o un successo collegato a questo concetto..."></textarea>
      <div style="margin-top:10px;display:flex;justify-content:flex-end">
        <button class="btn-main" style="width:auto" onclick="submitEntry()">Registra nel diario</button>
      </div>
    </div>`;
  }
  return h;
}

function viewLibrary(){
  const authors=[...new Set(C.map(c=>c.a))];
  let h='';
  authors.forEach(author=>{
    h+=`<p class="author-header">${author}</p>`;
    C.filter(c=>c.a===author).forEach(c=>{
      const n=E.filter(e=>e.concept_id===c.id).length;
      h+=`<div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          <p style="font-size:15px;font-weight:500">${c.t}</p>
          ${n>0?`<span class="count-badge">${n} entr${n===1?'y':'ies'}</span>`:''}
        </div>
        <p style="font-size:12px;color:#6B6A65;font-style:italic;margin-bottom:8px">${c.b}</p>
        <p style="font-size:13px;line-height:1.7;margin-bottom:8px">${c.d}</p>
        <div>${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
    });
  });
  return h;
}

function viewLog(){
  if(!E.length) return `<div class="empty"><p>Il diario è vuoto</p><p>Completa la sfida del giorno per iniziare.</p></div>`;
  let h=`<p style="font-size:13px;color:#6B6A65;margin-bottom:1rem">${E.length} entr${E.length===1?'y':'ies'} totali</p>`;
  E.forEach(e=>{
    const c=C.find(x=>x.id===e.concept_id), col=typeColors(e.type);
    const d=new Date(e.created_at).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
    h+=`<div class="card">
      <div class="log-meta">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge" style="background:${col.bg};color:${col.tx}">${e.type}</span>
          ${c?`<span class="log-concept">${c.t}</span>`:''}
        </div>
        <span class="log-date">${d} &nbsp;+${e.xp} XP</span>
      </div>
      <p class="log-text">${e.text}</p>
      ${c?`<p class="log-source">${c.a} — ${c.b}</p>`:''}
    </div>`;
  });
  return h;
}

function viewStats(){
  const level=lv(P.xp), pct=Math.min(100,Math.round(((P.xp-level.min)/(level.max-level.min))*100));
  const v=E.filter(e=>e.type==='Vittoria').length, sc=E.filter(e=>e.type==='Sconfitta').length, ins=E.filter(e=>e.type==='Insight').length;
  const tagC={};
  E.forEach(e=>{const c=C.find(x=>x.id===e.concept_id);if(c)c.tags.forEach(t=>{tagC[t]=(tagC[t]||0)+1;});});
  const topT=Object.entries(tagC).sort((a,b)=>b[1]-a[1]).slice(0,6);

  let h=`<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem">
    <div class="metric"><p class="metric-label">Livello</p><p class="metric-val">${level.n}</p><div class="progress-bar" style="width:100%;margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    <div class="metric"><p class="metric-label">XP totale</p><p class="metric-val">${P.xp}</p><p class="metric-sub">${level.max-P.xp<9999?level.max-P.xp+' al prossimo':'Max!'}</p></div>
    <div class="metric"><p class="metric-label">Streak</p><p class="metric-val">${P.streak}gg</p><p class="metric-sub">${P.total} entries</p></div>
  </div>
  <div class="card"><p class="section-label">Battle log</p>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px">
      <div style="background:#EAF3DE;padding:12px;border-radius:8px;text-align:center"><p style="font-family:'EB Garamond',serif;font-size:26px;color:#27500A">${v}</p><p style="font-size:12px;color:#3B6D11;margin-top:2px">Vittorie</p></div>
      <div style="background:#FCEBEB;padding:12px;border-radius:8px;text-align:center"><p style="font-family:'EB Garamond',serif;font-size:26px;color:#791F1F">${sc}</p><p style="font-size:12px;color:#A32D2D;margin-top:2px">Sconfitte</p></div>
      <div style="background:#E6F1FB;padding:12px;border-radius:8px;text-align:center"><p style="font-family:'EB Garamond',serif;font-size:26px;color:#0C447C">${ins}</p><p style="font-size:12px;color:#185FA5;margin-top:2px">Insights</p></div>
    </div>
  </div>`;
  if(topT.length){
    h+=`<div class="card"><p class="section-label">Temi più praticati</p>`;
    topT.forEach(([tag,cnt])=>{
      const w=Math.round((cnt/topT[0][1])*100);
      h+=`<div class="bar-row"><div class="bar-info"><span>${tag}</span><span>${cnt}</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div style="text-align:center;margin-top:1.5rem"><button class="reset-btn" onclick="resetAll()">Reset tutti i dati</button></div>`;
  return h;
}

// ─── Azioni ───────────────────────────────────────────────────────────────────
window.sv=v=>{UI.view=v;UI.flash=null;render();};
window.setAuthTab=t=>{UI.authTab=t;UI.authError='';UI.authSuccess='';render();};
window.stype=t=>{
  UI.logType=t;
  document.querySelectorAll('[data-tp]').forEach(btn=>{
    const tp=btn.getAttribute('data-tp'),col=typeColors(tp),isOn=tp===t;
    btn.style.background=isOn?col.bg:''; btn.style.color=isOn?col.tx:'';
    btn.style.borderColor=isOn?col.br:''; btn.style.fontWeight=isOn?'500':'';
  });
};

window.authSubmit=async()=>{
  const email=document.getElementById('auth-email')?.value?.trim();
  const pw=document.getElementById('auth-pw')?.value;
  if(!email||!pw){UI.authError='Inserisci email e password.';render();return;}
  UI.authError='';UI.authSuccess='';
  if(UI.authTab==='login'){
    const {error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error){UI.authError=traduciErrore(error.message);render();}
  } else {
    const {error}=await sb.auth.signUp({email,password:pw});
    if(error){UI.authError=traduciErrore(error.message);render();}
    else{UI.authSuccess='Account creato! Controlla la tua email per confermare, poi accedi.';UI.authTab='login';render();}
  }
};

window.resetPassword=async()=>{
  const email=document.getElementById('auth-email')?.value?.trim();
  if(!email){UI.authError='Inserisci la tua email prima.';render();return;}
  await sb.auth.resetPasswordForEmail(email);
  UI.authSuccess='Email di reset inviata. Controlla la tua casella.';UI.authError='';render();
};

window.logout=async()=>{
  await sb.auth.signOut();
  user=null;P={xp:0,streak:0,last_date:'',total:0};E=[];UI.view='today';render();
};

window.submitEntry=async()=>{
  const ta=document.getElementById('log-txt');
  const text=ta?.value?.trim();
  if(!text){if(ta){ta.style.borderColor='#E24B4A';setTimeout(()=>ta.style.borderColor='',1500);}return;}
  const today=todayStr(), yest=new Date();
  yest.setDate(yest.getDate()-1);
  if(P.last_date===yest.toDateString()) P.streak+=1;
  else if(P.last_date!==today) P.streak=1;
  P.last_date=today;
  const xpGain=XP[UI.logType];
  P.xp+=xpGain; P.total+=1;
  UI.syncing=true; render();
  const [saved]=await Promise.all([saveEntry({cid:C[todayIdx()].id,type:UI.logType,text,xp:xpGain}),saveProfile()]);
  if(saved) E.unshift(saved);
  UI.syncing=false;
  UI.flash=`+${xpGain} XP — ${UI.logType} registrata! Streak: ${P.streak} giorni.`;
  render();
  setTimeout(()=>{UI.flash=null;const f=document.getElementById('flash-msg');if(f)f.remove();},3500);
};

window.resetAll=async()=>{
  if(!confirm('Sei sicuro? Tutti i dati verranno eliminati permanentemente.')) return;
  await sb.from('entries').delete().eq('user_id',user.id);
  P={xp:0,streak:0,last_date:'',total:0};E=[];
  await saveProfile();render();
};

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot(){
  document.getElementById('root').innerHTML=`<div class="wrap"><div class="loading-screen"><div class="spinner"></div><span>Caricamento...</span></div></div>`;
  sb.auth.onAuthStateChange(async(event,session)=>{
    user=session?.user??null;
    if(user) await loadUserData();
    render();
  });
  const {data:{session}}=await sb.auth.getSession();
  user=session?.user??null;
  await loadConcepts();
  if(user) await loadUserData();
  render();
}
boot();
</script>
</body>
</html>
